<div class="mx-auto max-w-lg">
  <h1 class="mb-4 text-lg font-semibold text-slate-900">{{ 'autogestion.tituloMiConstancia' | translate }}</h1>

  <div class="rounded-lg border border-slate-200 bg-white p-6 shadow-sm">
    <p class="mb-4 text-sm text-slate-600">{{ 'autogestion.constanciaDescripcion' | translate }}</p>

    @if (error()) {
      <p class="mb-4 text-sm text-red-600">{{ error() | translate }}</p>
    }

    <button
      type="button"
      [disabled]="generando()"
      (click)="descargar()"
      class="w-full rounded bg-primary-700 px-4 py-2.5 text-sm font-medium text-white hover:bg-primary-800 disabled:opacity-50"
    >
      {{ (generando() ? 'autogestion.generandoConstancia' : 'autogestion.descargarConstancia') | translate }}
    </button>
  </div>
</div>
