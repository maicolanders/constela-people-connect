<div class="mx-auto max-w-lg">
  <h1 class="mb-4 text-lg font-semibold text-slate-900">{{ 'autogestion.tituloMiEconomia' | translate }}</h1>

  @if (cargando()) {
    <p class="text-sm text-slate-500">{{ 'poblacion.cargando' | translate }}</p>
  } @else {
    <form class="rounded-lg border border-slate-200 bg-white p-6 shadow-sm" [formGroup]="formulario" (ngSubmit)="guardar()">
      <label class="mb-4 block">
        <span class="mb-1 block text-sm font-medium text-slate-700">{{ 'economia.condicionActividad' | translate }}</span>
        <select
          [value]="condicionSeleccionadaId()"
          (change)="onCondicionChange($any($event.target).value)"
          class="w-full rounded border border-slate-300 px-3 py-2 text-sm"
        >
          <option value="">{{ 'georreferenciacion.seleccionar' | translate }}</option>
          @for (item of condicionesActividad(); track item.id) {
            <option [value]="item.id">{{ item.nombre }}</option>
          }
        </select>
      </label>

      @if (esOcupado()) {
        <label class="mb-4 block">
          <span class="mb-1 block text-sm font-medium text-slate-700">{{ 'economia.tipoOcupacion' | translate }}</span>
          <select formControlName="ocupacionCatalogoItemId" class="w-full rounded border border-slate-300 px-3 py-2 text-sm">
            <option [ngValue]="null">{{ 'georreferenciacion.seleccionar' | translate }}</option>
            @for (item of ocupaciones(); track item.id) {
              <option [ngValue]="item.id">{{ item.nombre }}</option>
            }
          </select>
        </label>
      }

      <label class="mb-4 block">
        <span class="mb-1 block text-sm font-medium text-slate-700">{{ 'economia.ingresoMensual' | translate }}</span>
        <input type="number" formControlName="ingresoMensual" class="w-full rounded border border-slate-300 px-3 py-2 text-sm" />
      </label>

      @if (error()) {
        <p class="mb-4 text-sm text-red-600">{{ error() | translate }}</p>
      }
      @if (guardadoExitoso()) {
        <p class="mb-4 text-sm text-green-700">{{ 'autogestion.guardadoExitoso' | translate }}</p>
      }

      <button
        type="submit"
        [disabled]="formulario.invalid || guardando()"
        class="w-full rounded bg-primary-700 px-4 py-2.5 text-sm font-medium text-white hover:bg-primary-800 disabled:opacity-50"
      >
        {{ (guardando() ? 'autogestion.guardando' : 'autogestion.guardar') | translate }}
      </button>
    </form>
  }
</div>
