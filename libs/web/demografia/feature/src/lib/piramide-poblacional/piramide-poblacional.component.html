<div class="mx-auto max-w-2xl p-4 sm:p-6 lg:p-8">
  <a
    routerLink="/"
    class="group mb-6 inline-flex items-center gap-2 rounded-full bg-slate-100 px-4 py-2 text-sm font-medium text-slate-600 transition-colors hover:bg-slate-200 hover:text-slate-900"
  >
    <svg class="h-4 w-4 transition-transform group-hover:-translate-x-1" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
    </svg>
    {{ 'comun.volverInicio' | translate }}
  </a>

  <div class="mb-6 flex items-center gap-3">
    <div class="flex h-11 w-11 shrink-0 items-center justify-center rounded-xl bg-primary-100 text-primary-600 shadow-sm">
      <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 013 19.875v-6.75zM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V8.625zM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V4.125z" />
      </svg>
    </div>
    <h1 class="text-xl font-bold tracking-tight text-slate-900">
      {{ 'demografia.piramideTitulo' | translate }}
    </h1>
  </div>

  <div class="mb-6 flex flex-wrap items-center gap-3 rounded-2xl border border-slate-200 bg-white p-4 shadow-sm">
    <select
      class="rounded-xl border border-slate-300 bg-white px-3.5 py-2 text-sm text-slate-900 transition focus:border-primary-500 focus:outline-none focus:ring-2 focus:ring-primary-500/20"
      [value]="comunidadId()"
      (change)="onComunidadChange($any($event.target).value)"
    >
      @for (comunidad of comunidades(); track comunidad.id) {
        <option [value]="comunidad.id">{{ comunidad.nombre }}</option>
      }
    </select>

    <select
      class="rounded-xl border border-slate-300 bg-white px-3.5 py-2 text-sm text-slate-900 transition focus:border-primary-500 focus:outline-none focus:ring-2 focus:ring-primary-500/20"
      [value]="periodoCensalId()"
      (change)="onPeriodoChange($any($event.target).value)"
    >
      @for (periodo of periodos(); track periodo.id) {
        <option [value]="periodo.id">
          {{ periodo.nombre }} ({{ periodo.estado }})
        </option>
      }
    </select>
  </div>

  @if (cargando()) {
    <div class="flex flex-col items-center justify-center py-16">
      <div class="h-10 w-10 animate-spin rounded-full border-4 border-slate-100 border-t-primary-600"></div>
      <p class="mt-4 text-sm font-medium text-slate-500">{{ 'poblacion.cargando' | translate }}</p>
    </div>
  } @else {
    <div class="mb-4 flex flex-wrap gap-2.5">
      <button
        type="button"
        class="inline-flex items-center gap-1.5 rounded-xl border border-slate-300 bg-white px-3.5 py-2 text-sm font-medium text-slate-700 shadow-sm transition-colors hover:bg-slate-50"
        (click)="exportarCsv()"
      >
        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3" />
        </svg>
        {{ 'demografia.exportarDatos' | translate }}
      </button>
      <button
        type="button"
        class="inline-flex items-center gap-1.5 rounded-xl border border-slate-300 bg-white px-3.5 py-2 text-sm font-medium text-slate-700 shadow-sm transition-colors hover:bg-slate-50"
        (click)="exportarImagen(svgPiramide)"
      >
        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909m-18 3.75h16.5a1.5 1.5 0 001.5-1.5V6a1.5 1.5 0 00-1.5-1.5H3.75A1.5 1.5 0 002.25 6v12a1.5 1.5 0 001.5 1.5zm10.5-11.25h.008v.008h-.008V8.25zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z" />
        </svg>
        {{ 'demografia.exportarImagen' | translate }}
      </button>
    </div>

    <div class="overflow-hidden rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
      <div class="mb-4 flex items-center justify-center gap-6 text-xs font-medium text-slate-600">
        <span class="flex items-center gap-1.5">
          <span class="h-2.5 w-2.5 rounded-sm bg-sky-500"></span>
          {{ 'demografia.masculino' | translate }}
        </span>
        <span class="flex items-center gap-1.5">
          <span class="h-2.5 w-2.5 rounded-sm bg-pink-500"></span>
          {{ 'demografia.femenino' | translate }}
        </span>
      </div>

      <svg
        #svgPiramide
        [attr.viewBox]="'0 0 ' + CHART_WIDTH + ' ' + alturaSvg()"
        [attr.width]="CHART_WIDTH"
        [attr.height]="alturaSvg()"
        class="mx-auto block"
      >
        @for (fila of filasVista(); track fila.grupoQuinquenal) {
          <rect
            [attr.x]="fila.masculinoX"
            [attr.y]="fila.y"
            [attr.width]="fila.masculinoAncho"
            [attr.height]="ROW_HEIGHT - 2"
            class="fill-sky-500"
          />
          <rect
            [attr.x]="fila.femeninoX"
            [attr.y]="fila.y"
            [attr.width]="fila.femeninoAncho"
            [attr.height]="ROW_HEIGHT - 2"
            class="fill-pink-500"
          />
          <text
            [attr.x]="CHART_WIDTH / 2"
            [attr.y]="fila.y + ROW_HEIGHT - 8"
            text-anchor="middle"
            font-size="9"
            class="fill-slate-700"
          >
            {{ fila.grupoQuinquenal }}
          </text>
          @if (fila.masculinoSuprimido) {
            <text
              [attr.x]="CENTER_START - 4"
              [attr.y]="fila.y + ROW_HEIGHT - 8"
              text-anchor="end"
              font-size="8"
              class="fill-amber-600"
            >
              —
            </text>
          }
          @if (fila.femeninoSuprimido) {
            <text
              [attr.x]="CENTER_END + 4"
              [attr.y]="fila.y + ROW_HEIGHT - 8"
              text-anchor="start"
              font-size="8"
              class="fill-amber-600"
            >
              —
            </text>
          }
        } @empty {
          <text
            [attr.x]="CHART_WIDTH / 2"
            [attr.y]="ROW_HEIGHT / 2"
            text-anchor="middle"
            font-size="10"
            class="fill-slate-500"
          >
            {{ 'demografia.sinDatos' | translate }}
          </text>
        }
      </svg>
    </div>
  }
</div>
