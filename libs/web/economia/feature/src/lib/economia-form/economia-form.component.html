<div class="mx-auto max-w-lg p-4 sm:p-6">
  <a
    routerLink="/poblacion/habitantes"
    class="group mb-6 inline-flex items-center gap-2 rounded-full bg-slate-100 px-4 py-2 text-sm font-medium text-slate-600 transition-colors hover:bg-slate-200 hover:text-slate-900"
  >
    <svg class="h-4 w-4 transition-transform group-hover:-translate-x-1" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
    </svg>
    {{ 'comun.volver' | translate }}
  </a>

  <div class="mb-6 flex items-center gap-3">
    <div class="flex h-11 w-11 shrink-0 items-center justify-center rounded-xl bg-primary-100 text-primary-600 shadow-sm">
      <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M20.25 14.15v4.25c0 1.094-.787 2.036-1.872 2.18-2.087.277-4.216.42-6.378.42s-4.291-.143-6.378-.42c-1.085-.144-1.872-1.086-1.872-2.18v-4.25m16.5 0a2.18 2.18 0 00.75-1.661V8.706c0-1.081-.768-2.015-1.837-2.175a48.114 48.114 0 00-3.413-.387m4.5 8.006c-.194.165-.42.295-.673.38a23.978 23.978 0 01-7.577 1.22 23.978 23.978 0 01-7.577-1.22 2.016 2.016 0 01-.673-.38m0 0A2.18 2.18 0 013 12.489V8.706c0-1.081.768-2.015 1.837-2.175a48.111 48.111 0 013.413-.387m7.5 0V5.25A2.25 2.25 0 0013.5 3h-3a2.25 2.25 0 00-2.25 2.25v.894m7.5 0a48.667 48.667 0 00-7.5 0" />
      </svg>
    </div>
    <h1 class="text-xl font-bold tracking-tight text-slate-900">
      {{ 'economia.economiaTitulo' | translate }}
    </h1>
  </div>

  <form
    class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm"
    [formGroup]="formulario"
    (ngSubmit)="guardar()"
  >
    <div class="mb-4">
      <label class="mb-1.5 block text-xs font-semibold text-slate-600">{{ 'economia.condicionActividad' | translate }}</label>
      <select
        (change)="onCondicionChange($any($event.target).value)"
        class="w-full rounded-xl border border-slate-300 bg-white px-3.5 py-2.5 text-sm text-slate-900 transition focus:border-primary-500 focus:outline-none focus:ring-2 focus:ring-primary-500/20"
      >
        <option value="">
          {{ 'georreferenciacion.seleccionar' | translate }}
        </option>
        @for (item of condicionesActividad(); track item.id) {
          <option [value]="item.id">{{ item.nombre }}</option>
        }
      </select>
    </div>

    @if (esOcupado()) {
      <div class="mb-4">
        <label class="mb-1.5 block text-xs font-semibold text-slate-600">{{ 'economia.tipoOcupacion' | translate }}</label>
        <select
          formControlName="ocupacionCatalogoItemId"
          class="w-full rounded-xl border border-slate-300 bg-white px-3.5 py-2.5 text-sm text-slate-900 transition focus:border-primary-500 focus:outline-none focus:ring-2 focus:ring-primary-500/20"
        >
          <option [ngValue]="null">
            {{ 'georreferenciacion.seleccionar' | translate }}
          </option>
          @for (item of ocupaciones(); track item.id) {
            <option [ngValue]="item.id">{{ item.nombre }}</option>
          }
        </select>
      </div>
    }

    <div class="mb-5">
      <label class="mb-1.5 block text-xs font-semibold text-slate-600">{{ 'economia.ingresoMensual' | translate }}</label>
      <div class="relative">
        <div class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3.5 text-slate-400">
          <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v12m-3-2.818l.879.659c1.171.879 3.07.879 4.242 0 1.172-.879 1.172-2.303 0-3.182C13.536 12.219 12.768 12 12 12c-.725 0-1.45-.22-2.003-.659-1.106-.879-1.106-2.303 0-3.182s2.9-.879 4.006 0l.415.33M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
        </div>
        <input
          type="number"
          formControlName="ingresoMensual"
          class="w-full rounded-xl border border-slate-300 bg-white py-2.5 pl-10 pr-3.5 text-sm text-slate-900 transition focus:border-primary-500 focus:outline-none focus:ring-2 focus:ring-primary-500/20"
        />
      </div>
    </div>

    @if (error()) {
      <div class="mb-4 flex items-center gap-2.5 rounded-xl border border-red-200 bg-red-50 p-3">
        <svg class="h-4 w-4 shrink-0 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z" />
        </svg>
        <p class="text-xs font-medium text-red-800">{{ error() | translate }}</p>
      </div>
    }

    <button
      type="submit"
      [disabled]="formulario.invalid || guardando()"
      class="inline-flex w-full items-center justify-center gap-2 rounded-xl bg-primary-600 px-5 py-2.5 text-sm font-semibold text-white shadow-sm transition-all hover:bg-primary-700 hover:shadow-md disabled:cursor-not-allowed disabled:opacity-50"
    >
      @if (guardando()) {
        <svg class="h-4 w-4 animate-spin" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99" />
        </svg>
      }
      {{
        (guardando() ? 'poblacion.guardando' : 'economia.guardarEconomia')
          | translate
      }}
    </button>
  </form>
</div>
