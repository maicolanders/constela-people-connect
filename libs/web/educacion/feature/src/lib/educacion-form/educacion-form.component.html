<div class="mx-auto max-w-lg p-4 sm:p-6">
  <a
    routerLink="/poblacion/habitantes"
    class="group mb-6 inline-flex items-center gap-2 rounded-full bg-slate-100 px-4 py-2 text-sm font-medium text-slate-600 transition-colors hover:bg-slate-200 hover:text-slate-900"
  >
    <svg class="h-4 w-4 transition-transform group-hover:-translate-x-1" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
    </svg>
    {{ 'comun.volver' | translate }}
  </a>

  <div class="mb-6 flex items-center gap-3">
    <div class="flex h-11 w-11 shrink-0 items-center justify-center rounded-xl bg-primary-100 text-primary-600 shadow-sm">
      <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4.26 10.147a60.436 60.436 0 00-.491 6.347A48.627 48.627 0 0112 20.904a48.627 48.627 0 018.232-4.41 60.46 60.46 0 00-.491-6.347M8.25 15V8.443m7.5 6.557V8.443M3.29 9.336a59.902 59.902 0 018.71-5.843 59.902 59.902 0 018.71 5.843m-17.42 0a48.13 48.13 0 013.288 1.007m14.132-1.007a48.13 48.13 0 00-3.288 1.007" />
      </svg>
    </div>
    <h1 class="text-xl font-bold tracking-tight text-slate-900">
      {{ 'educacion.educacionTitulo' | translate }}
    </h1>
  </div>

  <form
    class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm"
    [formGroup]="formulario"
    (ngSubmit)="guardar()"
  >
    <div class="mb-5 space-y-2.5">
      <label class="flex cursor-pointer items-center justify-between gap-3 rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 transition has-[:checked]:border-primary-300 has-[:checked]:bg-primary-50">
        <span class="text-sm font-medium text-slate-700">{{ 'educacion.alfabetizado' | translate }}</span>
        <input type="checkbox" formControlName="alfabetizado" class="h-4.5 w-4.5 rounded border-slate-300 text-primary-600 focus:ring-primary-500" />
      </label>
      <label class="flex cursor-pointer items-center justify-between gap-3 rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 transition has-[:checked]:border-primary-300 has-[:checked]:bg-primary-50">
        <span class="text-sm font-medium text-slate-700">{{ 'educacion.asisteEscuela' | translate }}</span>
        <input type="checkbox" formControlName="asisteEscuela" class="h-4.5 w-4.5 rounded border-slate-300 text-primary-600 focus:ring-primary-500" />
      </label>
    </div>

    <div class="mb-5">
      <label class="mb-1.5 block text-xs font-semibold text-slate-600">{{ 'educacion.nivelEducativo' | translate }}</label>
      <select
        formControlName="nivelEducativoCatalogoItemId"
        class="w-full rounded-xl border border-slate-300 bg-white px-3.5 py-2.5 text-sm text-slate-900 transition focus:border-primary-500 focus:outline-none focus:ring-2 focus:ring-primary-500/20"
      >
        <option [ngValue]="null">
          {{ 'georreferenciacion.seleccionar' | translate }}
        </option>
        @for (item of nivelesEducativos(); track item.id) {
          <option [ngValue]="item.id">{{ item.nombre }}</option>
        }
      </select>
    </div>

    <div class="mb-5">
      <h2 class="mb-2.5 text-xs font-bold uppercase tracking-wider text-slate-500">
        {{ 'educacion.lenguas' | translate }}
      </h2>
      <div formArrayName="lenguas" class="space-y-2.5">
        @for (
          control of lenguasFormArray.controls;
          track $index;
          let i = $index
        ) {
          <div [formGroupName]="i" class="flex flex-col gap-2.5 rounded-xl border border-slate-200 bg-slate-50 p-3 sm:flex-row sm:items-center">
            <select
              formControlName="lenguaCatalogoItemId"
              class="flex-1 rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm text-slate-900 transition focus:border-primary-500 focus:outline-none focus:ring-2 focus:ring-primary-500/20"
            >
              <option [ngValue]="null">
                {{ 'georreferenciacion.seleccionar' | translate }}
              </option>
              @for (lengua of lenguasDisponibles(); track lengua.id) {
                <option [ngValue]="lengua.id">{{ lengua.nombre }}</option>
              }
            </select>
            <label class="flex shrink-0 items-center gap-1.5 px-1 text-xs font-medium text-slate-600">
              <input type="checkbox" formControlName="esLenguaMaterna" class="h-4 w-4 rounded border-slate-300 text-primary-600 focus:ring-primary-500" />
              {{ 'educacion.lenguaMaterna' | translate }}
            </label>
            <button
              type="button"
              (click)="quitarLengua(i)"
              class="inline-flex shrink-0 items-center justify-center rounded-lg border border-slate-300 bg-white p-2 text-slate-500 transition hover:border-red-300 hover:bg-red-50 hover:text-red-600"
              [attr.aria-label]="'educacion.quitar' | translate"
            >
              <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 12h-15" />
              </svg>
            </button>
          </div>
        }
      </div>
      <button
        type="button"
        (click)="agregarLengua()"
        class="mt-2.5 inline-flex items-center gap-1.5 rounded-lg border border-dashed border-slate-300 px-3 py-2 text-xs font-semibold text-slate-600 transition hover:border-primary-300 hover:bg-primary-50 hover:text-primary-700"
      >
        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
        </svg>
        {{ 'educacion.agregarLengua' | translate }}
      </button>
    </div>

    @if (error()) {
      <div class="mb-4 flex items-center gap-2.5 rounded-xl border border-red-200 bg-red-50 p-3">
        <svg class="h-4 w-4 shrink-0 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z" />
        </svg>
        <p class="text-xs font-medium text-red-800">{{ error() | translate }}</p>
      </div>
    }

    <button
      type="submit"
      [disabled]="formulario.invalid || guardando()"
      class="inline-flex w-full items-center justify-center gap-2 rounded-xl bg-primary-600 px-5 py-2.5 text-sm font-semibold text-white shadow-sm transition-all hover:bg-primary-700 hover:shadow-md disabled:cursor-not-allowed disabled:opacity-50"
    >
      @if (guardando()) {
        <svg class="h-4 w-4 animate-spin" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99" />
        </svg>
      }
      {{
        (guardando() ? 'poblacion.guardando' : 'educacion.guardarEducacion')
          | translate
      }}
    </button>
  </form>
</div>
