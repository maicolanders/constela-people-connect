<div class="mx-auto max-w-lg p-4">
  <a
    routerLink="/poblacion/habitantes"
    class="mb-4 inline-flex items-center gap-1 text-sm font-medium text-primary-700 hover:text-primary-800"
  >
    <span aria-hidden="true">←</span> {{ 'comun.volver' | translate }}
  </a>

  <h1 class="mb-4 text-lg font-semibold text-slate-900">
    {{ 'poblacion.nuevoHogarTitulo' | translate }}
  </h1>

  <form
    class="rounded-lg border border-slate-200 bg-white p-6 shadow-sm"
    [formGroup]="formulario"
    (ngSubmit)="guardar()"
  >
    <label
      class="mb-1 block text-sm font-medium text-slate-700"
      for="direccionReferencia"
    >
      {{ 'poblacion.direccionReferencia' | translate }}
    </label>
    <input
      id="direccionReferencia"
      type="text"
      formControlName="direccionReferencia"
      class="mb-4 w-full rounded border border-slate-300 px-3 py-2.5 text-sm focus:border-primary-500 focus:outline-none focus:ring-1 focus:ring-primary-500"
    />

    <label class="mb-4 flex items-center gap-2 text-sm text-slate-700">
      <input
        type="checkbox"
        formControlName="consentimientoInformado"
        class="h-4 w-4 rounded border-slate-300"
      />
      {{ 'poblacion.consentimientoInformado' | translate }}
    </label>

    @if (error()) {
      <p class="mb-4 text-sm text-red-600">{{ error() | translate }}</p>
    }

    <button
      type="submit"
      [disabled]="formulario.invalid || guardando()"
      class="w-full rounded bg-primary-700 px-4 py-2.5 text-sm font-medium text-white hover:bg-primary-800 disabled:opacity-50"
    >
      {{
        (guardando() ? 'poblacion.guardando' : 'poblacion.crearHogar')
          | translate
      }}
    </button>
  </form>
</div>
