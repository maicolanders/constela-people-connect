<div class="mx-auto max-w-lg p-4 sm:p-6">
  <a
    routerLink="/"
    class="group mb-6 inline-flex items-center gap-2 rounded-full bg-slate-100 px-4 py-2 text-sm font-medium text-slate-600 transition-colors hover:bg-slate-200 hover:text-slate-900"
  >
    <svg class="h-4 w-4 transition-transform group-hover:-translate-x-1" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
    </svg>
    {{ 'comun.volverInicio' | translate }}
  </a>

  <div class="mb-6 flex items-center gap-3">
    <div class="flex h-11 w-11 shrink-0 items-center justify-center rounded-xl bg-primary-100 text-primary-600 shadow-sm">
      <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 18.75a60.07 60.07 0 0115.797 2.101c.727.198 1.453-.342 1.453-1.096V18.75M3.75 4.5v.75A.75.75 0 013 6h-.75m0 0v-.375c0-.621.504-1.125 1.125-1.125H20.25M2.25 6v9m18-10.5v.75c0 .414.336.75.75.75h.75m-1.5-1.5h.375c.621 0 1.125.504 1.125 1.125v9.75c0 .621-.504 1.125-1.125 1.125h-.375m1.5-1.5H21a.75.75 0 00-.75.75v.75m0 0H3.75m0 0h-.375a1.125 1.125 0 01-1.125-1.125V15m1.5 1.5v-.75A.75.75 0 003 15h-.75M15 10.5a3 3 0 11-6 0 3 3 0 016 0z" />
      </svg>
    </div>
    <h1 class="text-xl font-bold tracking-tight text-slate-900">
      {{ 'recursos.tituloFormPresupuesto' | translate }}
    </h1>
  </div>

  <form
    class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm"
    [formGroup]="formulario"
    (ngSubmit)="guardar()"
  >
    <div class="mb-4">
      <label class="mb-1.5 block text-xs font-semibold text-slate-600">{{ 'recursos.comunidad' | translate }}</label>
      <select
        formControlName="comunidadId"
        (change)="onComunidadOPeriodoChange()"
        class="w-full rounded-xl border border-slate-300 bg-white px-3.5 py-2.5 text-sm text-slate-900 transition focus:border-primary-500 focus:outline-none focus:ring-2 focus:ring-primary-500/20"
      >
        <option [ngValue]="null">
          {{ 'georreferenciacion.seleccionar' | translate }}
        </option>
        @for (comunidad of comunidades(); track comunidad.id) {
          <option [ngValue]="comunidad.id">{{ comunidad.nombre }}</option>
        }
      </select>
    </div>

    <div class="mb-1">
      <label class="mb-1.5 block text-xs font-semibold text-slate-600">{{ 'recursos.periodoCensal' | translate }}</label>
      <select
        formControlName="periodoCensalId"
        (change)="onComunidadOPeriodoChange()"
        class="w-full rounded-xl border border-slate-300 bg-white px-3.5 py-2.5 text-sm text-slate-900 transition focus:border-primary-500 focus:outline-none focus:ring-2 focus:ring-primary-500/20"
      >
        <option [ngValue]="null">
          {{ 'georreferenciacion.seleccionar' | translate }}
        </option>
        @for (periodo of periodos(); track periodo.id) {
          <option [ngValue]="periodo.id">{{ periodo.nombre }}</option>
        }
      </select>
    </div>

    @if (cargando()) {
      <p class="mb-4 mt-2 text-xs font-medium text-slate-500">
        {{ 'poblacion.cargando' | translate }}
      </p>
    }

    <div class="mb-4">
      <label class="mb-1.5 block text-xs font-semibold text-slate-600">{{ 'recursos.monto' | translate }}</label>
      <input
        type="number"
        step="0.01"
        formControlName="monto"
        class="w-full rounded-xl border border-slate-300 bg-white px-3.5 py-2.5 text-sm text-slate-900 transition focus:border-primary-500 focus:outline-none focus:ring-2 focus:ring-primary-500/20"
      />
    </div>

    <div class="mb-5">
      <label class="mb-1.5 block text-xs font-semibold text-slate-600">{{ 'recursos.observaciones' | translate }}</label>
      <textarea
        formControlName="observaciones"
        rows="3"
        class="w-full rounded-xl border border-slate-300 bg-white px-3.5 py-2.5 text-sm text-slate-900 transition focus:border-primary-500 focus:outline-none focus:ring-2 focus:ring-primary-500/20"
      ></textarea>
    </div>

    @if (error()) {
      <div class="mb-4 flex items-center gap-2.5 rounded-xl border border-red-200 bg-red-50 p-3">
        <svg class="h-4 w-4 shrink-0 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z" />
        </svg>
        <p class="text-xs font-medium text-red-800">{{ error() | translate }}</p>
      </div>
    }
    @if (guardadoExitoso()) {
      <div class="mb-4 flex items-center gap-2.5 rounded-xl border border-emerald-200 bg-emerald-50 p-3">
        <svg class="h-4 w-4 shrink-0 text-emerald-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        <p class="text-xs font-medium text-emerald-800">
          {{ 'recursos.presupuestoGuardado' | translate }}
        </p>
      </div>
    }

    <button
      type="submit"
      [disabled]="formulario.invalid || guardando()"
      class="inline-flex w-full items-center justify-center gap-2 rounded-xl bg-primary-600 px-5 py-2.5 text-sm font-semibold text-white shadow-sm transition-all hover:bg-primary-700 hover:shadow-md disabled:cursor-not-allowed disabled:opacity-50"
    >
      @if (guardando()) {
        <svg class="h-4 w-4 animate-spin" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99" />
        </svg>
      }
      {{
        (guardando() ? 'poblacion.guardando' : 'recursos.guardarPresupuesto')
          | translate
      }}
    </button>
  </form>
</div>
