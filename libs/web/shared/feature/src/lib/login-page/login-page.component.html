<div class="flex min-h-screen items-center justify-center bg-slate-50 px-4">
  <form
    class="w-full max-w-sm rounded-lg border border-slate-200 bg-white p-6 shadow-sm"
    [formGroup]="formulario"
    (ngSubmit)="enviar()"
  >
    <h1 class="mb-6 text-xl font-semibold text-slate-900">{{ 'auth.loginTitle' | translate }}</h1>

    <label class="mb-1 block text-sm font-medium text-slate-700" for="email">
      {{ 'auth.email' | translate }}
    </label>
    <input
      id="email"
      type="email"
      formControlName="email"
      autocomplete="email"
      class="mb-4 w-full rounded border border-slate-300 px-3 py-2 text-sm focus:border-slate-500 focus:outline-none"
    />

    <label class="mb-1 block text-sm font-medium text-slate-700" for="password">
      {{ 'auth.password' | translate }}
    </label>
    <input
      id="password"
      type="password"
      formControlName="password"
      autocomplete="current-password"
      class="mb-4 w-full rounded border border-slate-300 px-3 py-2 text-sm focus:border-slate-500 focus:outline-none"
    />

    @if (error()) {
      <p class="mb-4 text-sm text-red-600">{{ error() | translate }}</p>
    }

    <button
      type="submit"
      [disabled]="formulario.invalid || enviando()"
      class="w-full rounded bg-slate-900 px-4 py-2 text-sm font-medium text-white disabled:opacity-50"
    >
      {{ (enviando() ? 'auth.loggingIn' : 'auth.loginSubmit') | translate }}
    </button>
  </form>
</div>
