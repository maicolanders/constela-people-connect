<div class="relative flex min-h-screen flex-col items-center justify-center overflow-hidden bg-slate-950 px-4 py-8 text-slate-100">
  
  <!-- Elementos de luz ambiental de fondo -->
  <div class="pointer-events-none absolute -top-40 -left-40 h-96 w-96 rounded-full bg-primary-600/20 blur-3xl"></div>
  <div class="pointer-events-none absolute -bottom-40 -right-40 h-96 w-96 rounded-full bg-teal-500/15 blur-3xl"></div>

  <div class="relative z-10 w-full max-w-md space-y-6">

    <!-- Encabezado / Branding -->
    <div class="text-center space-y-3">
      <div class="inline-flex h-14 w-14 items-center justify-center rounded-2xl bg-gradient-to-tr from-primary-600 via-primary-500 to-teal-400 text-white shadow-xl shadow-primary-950/50 ring-1 ring-white/20">
        <svg class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 21a9 9 0 100-18 9 9 0 000 18z M12 6v6l4 2" />
        </svg>
      </div>
      <div>
        <h1 class="text-2xl font-extrabold tracking-tight text-white sm:text-3xl">
          {{ 'shell.title' | translate }}
        </h1>
        <p class="mt-1 text-xs font-medium text-slate-400">
          Plataforma de Gestión Censal y Georreferenciación
        </p>
      </div>
    </div>

    <!-- Formulario Principal de Login -->
    <form
      class="overflow-hidden rounded-3xl border border-slate-800 bg-slate-900/80 p-6 sm:p-8 shadow-2xl backdrop-blur-xl transition-all"
      [formGroup]="formulario"
      (ngSubmit)="enviar()"
    >
      <div class="mb-6 flex items-center justify-between border-b border-slate-800 pb-4">
        <h2 class="text-lg font-bold text-white flex items-center gap-2">
          <svg class="h-5 w-5 text-primary-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" />
          </svg>
          {{ 'auth.loginTitle' | translate }}
        </h2>
        <span class="rounded-full bg-primary-500/10 px-2.5 py-0.5 text-[10px] font-semibold text-primary-300 border border-primary-500/20">
          Staff / Censo
        </span>
      </div>

      <!-- Campo Email -->
      <div class="mb-4">
        <label class="mb-1.5 block text-xs font-semibold text-slate-300" for="email">
          {{ 'auth.email' | translate }}
        </label>
        <div class="relative">
          <div class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3.5 text-slate-400">
            <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75" />
            </svg>
          </div>
          <input
            id="email"
            type="email"
            formControlName="email"
            autocomplete="email"
            placeholder="correo@ejemplo.com"
            class="w-full rounded-xl border border-slate-700 bg-slate-950/70 pl-10 pr-4 py-3 text-sm text-white placeholder-slate-500 transition focus:border-primary-500 focus:bg-slate-950 focus:outline-none focus:ring-2 focus:ring-primary-500/30"
          />
        </div>
      </div>

      <!-- Campo Password -->
      <div class="mb-6">
        <label class="mb-1.5 block text-xs font-semibold text-slate-300" for="password">
          {{ 'auth.password' | translate }}
        </label>
        <div class="relative">
          <div class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3.5 text-slate-400">
            <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
            </svg>
          </div>
          <input
            id="password"
            type="password"
            formControlName="password"
            autocomplete="current-password"
            placeholder="••••••••"
            class="w-full rounded-xl border border-slate-700 bg-slate-950/70 pl-10 pr-4 py-3 text-sm text-white placeholder-slate-500 transition focus:border-primary-500 focus:bg-slate-950 focus:outline-none focus:ring-2 focus:ring-primary-500/30"
          />
        </div>
      </div>

      <!-- Error alert -->
      @if (error()) {
        <div class="mb-5 flex items-center gap-2.5 rounded-xl border border-rose-500/30 bg-rose-500/10 p-3 text-xs font-medium text-rose-300">
          <svg class="h-4 w-4 shrink-0 text-rose-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z" />
          </svg>
          <span>{{ error() | translate }}</span>
        </div>
      }

      <!-- Botón de Submit -->
      <button
        type="submit"
        [disabled]="formulario.invalid || enviando()"
        class="group inline-flex w-full items-center justify-center gap-2 rounded-xl bg-gradient-to-r from-primary-600 to-teal-500 px-4 py-3 text-sm font-bold text-white shadow-lg transition-all hover:from-primary-500 hover:to-teal-400 hover:shadow-primary-600/30 focus:outline-none focus:ring-2 focus:ring-primary-500/40 disabled:cursor-not-allowed disabled:opacity-50"
      >
        @if (enviando()) {
          <svg class="h-4 w-4 animate-spin text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99" />
          </svg>
        } @else {
          <svg class="h-4 w-4 transition-transform group-hover:translate-x-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l3 3m0 0l-3 3m3-3H2.25" />
          </svg>
        }
        <span>{{ (enviando() ? 'auth.loggingIn' : 'auth.loginSubmit') | translate }}</span>
      </button>
    </form>

    <!-- Tarjeta Destacada de Acceso a Comuneros / Autogestión -->
    <div class="rounded-3xl border border-cyan-500/30 bg-gradient-to-br from-cyan-950/60 via-slate-900/90 to-slate-950 p-5 shadow-xl backdrop-blur-xl">
      <div class="flex items-start gap-3.5">
        <div class="flex h-10 w-10 shrink-0 items-center justify-center rounded-2xl bg-cyan-500/20 text-cyan-300 border border-cyan-500/30">
          <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 9h3.75M15 12h3.75M15 15h3.75M4.5 19.5h15a2.25 2.25 0 002.25-2.25V6.75A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25v10.5A2.25 2.25 0 004.5 19.5z" />
          </svg>
        </div>
        <div class="flex-1">
          <h3 class="text-sm font-bold text-white">
            {{ 'auth.loginComuneros' | translate }}
          </h3>
          <p class="mt-1 text-xs leading-relaxed text-slate-400">
            {{ 'auth.descComuneros' | translate }}
          </p>
          <a
            routerLink="/autogestion/login"
            class="group mt-3 inline-flex items-center gap-2 rounded-xl bg-cyan-500/10 px-3.5 py-2 text-xs font-bold text-cyan-300 border border-cyan-500/30 transition-all hover:bg-cyan-500 hover:text-slate-950 hover:border-cyan-400"
          >
            <span>Ingresar como Comunero</span>
            <svg class="h-3.5 w-3.5 transition-transform group-hover:translate-x-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3" />
            </svg>
          </a>
        </div>
      </div>
    </div>

  </div>
</div>
