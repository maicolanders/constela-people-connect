<div class="flex min-h-screen flex-col items-center justify-center bg-slate-50 px-4">
  <p class="mb-6 text-center text-sm font-medium text-primary-800">{{ 'shell.title' | translate }}</p>

  <form
    class="w-full max-w-sm overflow-hidden rounded-lg border border-slate-200 bg-white shadow-sm"
    [formGroup]="formulario"
    (ngSubmit)="enviar()"
  >
    <div class="h-1.5 bg-primary-700"></div>
    <div class="p-6">
      <h1 class="mb-6 text-xl font-semibold text-slate-900">{{ 'auth.loginTitle' | translate }}</h1>

      <label class="mb-1 block text-sm font-medium text-slate-700" for="email">
        {{ 'auth.email' | translate }}
      </label>
      <input
        id="email"
        type="email"
        formControlName="email"
        autocomplete="email"
        class="mb-4 w-full rounded border border-slate-300 px-3 py-2.5 text-sm focus:border-primary-500 focus:outline-none focus:ring-1 focus:ring-primary-500"
      />

      <label class="mb-1 block text-sm font-medium text-slate-700" for="password">
        {{ 'auth.password' | translate }}
      </label>
      <input
        id="password"
        type="password"
        formControlName="password"
        autocomplete="current-password"
        class="mb-4 w-full rounded border border-slate-300 px-3 py-2.5 text-sm focus:border-primary-500 focus:outline-none focus:ring-1 focus:ring-primary-500"
      />

      @if (error()) {
        <p class="mb-4 text-sm text-red-600">{{ error() | translate }}</p>
      }

      <button
        type="submit"
        [disabled]="formulario.invalid || enviando()"
        class="w-full rounded bg-primary-700 px-4 py-2.5 text-sm font-medium text-white hover:bg-primary-800 disabled:opacity-50"
      >
        {{ (enviando() ? 'auth.loggingIn' : 'auth.loginSubmit') | translate }}
      </button>
    </div>
  </form>
</div>
