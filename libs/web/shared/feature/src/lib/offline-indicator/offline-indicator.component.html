<span
  class="inline-flex items-center gap-1.5 rounded-full px-2.5 py-1 text-xs font-semibold border transition-all duration-300"
  [class.border-emerald-500/30]="syncService.enLinea()"
  [class.bg-emerald-500/10]="syncService.enLinea()"
  [class.text-emerald-300]="syncService.enLinea()"
  [class.border-amber-500/40]="!syncService.enLinea()"
  [class.bg-amber-500/15]="!syncService.enLinea()"
  [class.text-amber-300]="!syncService.enLinea()"
>
  @if (syncService.enLinea()) {
    <span class="relative flex h-2 w-2">
      <span class="absolute inline-flex h-full w-full animate-ping rounded-full bg-emerald-400 opacity-75"></span>
      <span class="relative inline-flex h-2 w-2 rounded-full bg-emerald-400"></span>
    </span>
    <svg class="h-3.5 w-3.5 text-emerald-400 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M8.288 15.038a5.25 5.25 0 017.424 0M5.106 11.856c3.807-3.808 9.98-3.808 13.788 0M1.924 8.674c5.565-5.565 14.587-5.565 20.152 0M12 18.75h.008v.008H12v-.008z" />
    </svg>
  } @else {
    <span class="relative flex h-2 w-2">
      <span class="relative inline-flex h-2 w-2 rounded-full bg-amber-400"></span>
    </span>
    <svg class="h-3.5 w-3.5 text-amber-400 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M3 3l18 18M12 18.75h.008v.008H12v-.008zM8.288 15.038a5.25 5.25 0 016.143-.88M5.106 11.856a12.637 12.637 0 019.894-2.82M1.924 8.674a17.844 17.844 0 0113.82-3.66" />
    </svg>
  }
  <span>{{ (syncService.enLinea() ? 'shell.online' : 'shell.offline') | translate }}</span>
</span>
