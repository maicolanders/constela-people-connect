<div class="flex min-h-screen flex-col">
  <header
    class="sticky top-0 z-10 flex items-center justify-between gap-2 border-b border-primary-900 bg-primary-800 px-4 py-3 shadow-sm"
  >
    <a routerLink="/" class="truncate text-sm font-semibold text-white">{{
      'shell.title' | translate
    }}</a>
    <div class="flex shrink-0 items-center gap-3">
      <app-offline-indicator />
      <button
        type="button"
        class="rounded px-2 py-1 text-sm font-medium text-primary-100 hover:bg-primary-700 hover:text-white"
        (click)="cerrarSesion()"
      >
        {{ 'shell.logout' | translate }}
      </button>
    </div>
  </header>

  <main class="flex-1 bg-slate-50 p-4">
    <router-outlet />
  </main>
</div>
