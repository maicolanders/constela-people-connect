<div class="flex min-h-screen flex-col bg-slate-50">
  <!-- Header Principal Con Estilo Cristalino y Oscuro -->
  <header
    class="sticky top-0 z-30 flex flex-wrap items-center justify-between gap-3 border-b border-slate-800/80 bg-slate-900/95 px-4 py-3 sm:px-6 backdrop-blur-md shadow-md"
  >
    <!-- Marca / Logo / Titulo -->
    <div class="flex items-center gap-3">
      <a
        routerLink="/"
        class="group flex items-center gap-2.5 transition-transform active:scale-95"
        title="Inicio"
      >
        <!-- Icono de Emblema Constela -->
        <div class="flex h-9 w-9 items-center justify-center rounded-xl bg-gradient-to-tr from-primary-600 via-primary-500 to-teal-400 text-white shadow-md transition-transform group-hover:scale-105">
          <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 21a9 9 0 100-18 9 9 0 000 18z M12 6v6l4 2" />
          </svg>
        </div>
        <span class="truncate text-sm sm:text-base font-bold tracking-tight text-white transition-colors group-hover:text-primary-300">
          {{ 'shell.title' | translate }}
        </span>
      </a>
    </div>

    <!-- Indicadores y Acciones -->
    <div class="flex shrink-0 items-center gap-2.5 sm:gap-3">
      <app-offline-indicator />
      <app-sync-status />

      <div class="hidden sm:block h-4 w-px bg-slate-800"></div>

      <!-- Botón de Cerrar Sesión con Icono -->
      <button
        type="button"
        class="inline-flex items-center gap-1.5 rounded-xl border border-rose-500/20 bg-rose-500/10 px-3 py-1.5 text-xs font-semibold text-rose-300 transition-all hover:bg-rose-600 hover:text-white hover:border-rose-500 focus:outline-none focus:ring-2 focus:ring-rose-500/40"
        (click)="cerrarSesion()"
        title="{{ 'shell.logout' | translate }}"
      >
        <svg class="h-3.5 w-3.5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15m3 0l3-3m0 0l-3-3m3 3H9" />
        </svg>
        <span class="hidden sm:inline">{{ 'shell.logout' | translate }}</span>
      </button>
    </div>
  </header>

  <!-- Contenido Principal -->
  <main class="flex-1 p-4 sm:p-6 lg:p-8">
    <router-outlet />
  </main>
</div>
