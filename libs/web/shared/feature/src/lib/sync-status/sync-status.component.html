<div class="flex items-center gap-2">
  @if (syncService.pendientes() > 0) {
    <span
      class="inline-flex items-center gap-1.5 rounded-full border border-amber-500/40 bg-amber-500/20 px-2.5 py-1 text-xs font-bold text-amber-300 shadow-xs"
      [title]="syncService.pendientes() + ' ' + ('shell.pendientesSincronizar' | translate)"
    >
      <svg class="h-3.5 w-3.5 text-amber-400 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 16.5V9.75m0 0l3 3m-3-3l-3 3M6.75 19.5a4.5 4.5 0 01-1.41-8.775 5.25 5.25 0 0110.233-2.33 3 3 0 013.758 3.848A3.752 3.752 0 0118 19.5H6.75z" />
      </svg>
      <span>{{ syncService.pendientes() }}</span>
      <span class="hidden md:inline font-normal text-amber-200/90">{{ 'shell.pendientesSincronizar' | translate }}</span>
    </span>
  }

  <button
    type="button"
    class="inline-flex items-center gap-1.5 rounded-xl border border-primary-500/30 bg-primary-700/50 px-3 py-1.5 text-xs font-semibold text-primary-100 transition-all hover:bg-primary-600 hover:text-white hover:border-primary-400 focus:outline-none focus:ring-2 focus:ring-primary-500/40 disabled:cursor-not-allowed disabled:opacity-50"
    [disabled]="!syncService.enLinea() || syncService.sincronizando()"
    (click)="sincronizarAhora()"
  >
    <svg
      class="h-3.5 w-3.5 shrink-0"
      [class.animate-spin]="syncService.sincronizando()"
      fill="none"
      viewBox="0 0 24 24"
      stroke="currentColor"
      stroke-width="2"
    >
      <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99" />
    </svg>
    <span class="hidden sm:inline">{{ (syncService.sincronizando() ? 'shell.sincronizando' : 'shell.sincronizarAhora') | translate }}</span>
  </button>
</div>
